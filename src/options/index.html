<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Honest Price Tracker - Settings</title>
  <style>
    body {
      margin: 0;
      padding: 32px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 32px;
      border-radius: 8px;
    }
    
    h1 {
      margin: 0 0 24px 0;
      font-size: 28px;
      color: #333;
    }
    
    .section {
      margin-bottom: 32px;
    }
    
    .section h2 {
      font-size: 18px;
      margin: 0 0 16px 0;
      color: #555;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #666;
    }
    
    input[type="checkbox"] {
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚙️ Settings</h1>
    
    <div class="section">
      <h2>Notifications</h2>
      <label>
        <input type="checkbox" id="notificationsEnabled" checked>
        Enable price drop notifications
      </label>
    </div>
    
    <div class="section">
      <h2>Privacy</h2>
      <p>✓ All data is stored locally on your device</p>
      <p>✓ No cookies are ever modified</p>
      <p>✓ No data is sent to external servers</p>
    </div>
    
    <div class="section">
      <h2>Data Management</h2>
      <button id="exportData">Export Data</button>
      <button id="importData">Import Data</button>
      <button id="clearData" style="color: red;">Clear All Data</button>
    </div>
  </div>
  
  <script src="options.js"></script>
</body>
</html>
